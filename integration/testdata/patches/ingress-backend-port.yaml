target: testchart/templates/ingress.yaml
patches:
  - action: patch
    data:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: test
      spec:
        rules:
        - host: chart-example.local
          http:
            paths:
            - backend:
                service:
                  name: test
                  port:
                    number: 1234
              path: /
              pathType: ImplementationSpecific
